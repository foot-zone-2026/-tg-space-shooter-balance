<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter Neon Pro Balance</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #020406; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #gameContainer { position: relative; width: 100%; max-width: 500px; height: 100vh; background: #020407; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #controls { display: flex; justify-content: space-between; align-items: center; width: 100%; position: absolute; bottom: 110px; padding: 0 25px; pointer-events: none; z-index: 5; }
        .move-group { display: flex; gap: 15px; }
        .btn { width: 75px; height: 75px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; color: white; font-size: 26px; background: rgba(255, 255, 255, 0.12); cursor: pointer; outline: none; display: flex; align-items: center; justify-content: center; pointer-events: auto; transition: background 0.05s; }
        .btn:active { background: rgba(255, 255, 255, 0.25); }
        #btnShoot { width: 85px; height: 85px; background: rgba(235, 94, 40, 0.25); border-color: rgba(235, 94, 40, 0.6); font-size: 32px; }
        
        #btnPause { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); padding: 6px 16px; font-size: 12px; font-weight: bold; color: #fff; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 15px; cursor: pointer; z-index: 8; pointer-events: auto; }

        .screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: #000; }
        .menu-btn { padding: 14px 45px; font-size: 18px; font-weight: bold; color: #ffffff; background: #111; border: 2px solid #ff1e27; border-radius: 30px; cursor: pointer; }
        
        /* استایل اختصاصی برای عدم دسترسی */
        #authErrorScreen { background: #000; z-index: 100; text-align: center; padding: 20px; display: none; }
        .error-message { color: #ff1e27; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .error-sub { color: #888; font-size: 16px; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<div id="gameContainer">
    <div id="authErrorScreen" class="screen-overlay">
        <div class="error-message">متأسفم</div>
        <div class="error-sub">شما اجازه ورود به بازی را ندارید.</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <button id="btnPause" style="display: none;">STOP</button>

    <div id="controls">
        <div class="move-group">
            <button id="btnLeft" class="btn">◀</button>
            <button id="btnRight" class="btn">▶</button>
        </div>
        <button id="btnShoot" class="btn">🔥</button>
    </div>

    <div id="welcomeScreen" class="screen-overlay" style="display: none;">
        <div class="welcome-title" style="color: #ff1e27; font-size: 34px; font-weight: 900; margin-bottom: 40px;">WELCOME</div>
        <button id="startBtn" class="menu-btn">START MISSION</button>
    </div>

    <div id="gameOverScreen" class="screen-overlay" style="display: none;">
        <div class="game-over-title" style="color: #ff2222; font-size: 46px; font-weight: 900; margin-bottom: 40px;">GAME OVER</div>
        <button id="restartBtn" class="menu-btn">START OVER</button>
    </div>

    <div id="countdownOverlay"><div id="countdownText">3</div></div>
    <div id="rewardOverlay"><span class="reward-text">STAGE CLEAR!</span></div>
</div>

<script>
// (سایر کدهای منطق بازی دقیقاً همان‌هایی هستند که فرستادید)
// فقط این بخش احراز هویت را جایگزین کنید:

const ALLOWED_TELEGRAM_IDS = [2049044424]; 
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function checkAuthentication() {
    let userTelegramId = null;
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userTelegramId = tg.initDataUnsafe.user.id;
    }

    if (userTelegramId !== null && ALLOWED_TELEGRAM_IDS.includes(Number(userTelegramId))) {
        document.getElementById('welcomeScreen').style.display = 'flex';
        return true;
    } else {
        document.getElementById('authErrorScreen').style.display = 'flex';
        document.getElementById('gameContainer').style.pointerEvents = 'none'; // غیرفعال کردن کل تعاملات
        return false;
    }
}

// ... بقیه کدهای بازی شما از اینجا به بعد قرار می‌گیرد ...
// (حتماً در انتهای فایل تابع checkAuthentication را صدا بزنید)
if (checkAuthentication()) {
    spawnWave();
}
</script>
</body>
</html>
