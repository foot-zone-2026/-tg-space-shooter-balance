<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Track - AI Prompt Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #020408;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #05070c;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #topBar {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 6;
            pointer-events: none;
        }
        #scoreBoard {
            color: #ffffff;
            font-size: 11px; 
            font-weight: 800;
            letter-spacing: 0.5px;
            background: rgba(4, 6, 12, 0.95);
            border: 1px solid #00d2ff;
            border-radius: 10px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            gap: 14px; 
            padding: 8px 14px; 
            flex-grow: 1;
            filter: drop-shadow(0 0 5px rgba(0, 210, 255, 0.6));
        }
        .sb-item {
            white-space: nowrap;
        }
        
        /* دکمه‌های کنترل بالای صفحه */
        .top-action-btn {
            padding: 7px 12px;
            font-size: 11px;
            font-weight: 800;
            color: #ffffff;
            background: rgba(4, 6, 12, 0.95);
            border-radius: 10px;
            cursor: pointer;
            pointer-events: auto;
            white-space: nowrap;
            margin-left: 8px;
            box-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
            transition: all 0.3s ease;
        }
        #pauseBtn {
            border: 1px solid #00d2ff;
            display: none;
        }
        
        /* استایل دکمه هوش مصنوعی - در ابتدا خاکستری و غیرفعال */
        #aiBtn {
            border: 1px solid #475569;
            background: rgba(30, 41, 59, 0.8);
            color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.5;
            display: none;
        }
        /* استایل دکمه هوش مصنوعی وقتی امتیاز به ۱۰۰ می‌رسد و فعال می‌شود */
        #aiBtn.active {
            border: 1px solid #10b981;
            background: rgba(4, 120, 87, 0.9);
            color: #ffffff;
            cursor: pointer;
            opacity: 1;
            filter: drop-shadow(0 0 10px #10b981);
            animation: pulseGlow 1.5s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px #10b981); }
            100% { filter: drop-shadow(0 0 15px #10b981); }
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 85px;
            align-items: center;
            width: 100%;
            position: absolute;
            bottom: 45px; 
            padding: 0 25px;
            pointer-events: none;
            z-index: 5;
        }
        .btn {
            width: 82px;
            height: 82px;
            border: 2px solid rgba(0, 210, 255, 0.3);
            border-radius: 50%;
            color: #00d2ff;
            font-size: 30px;
            background: rgba(0, 210, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            cursor: pointer;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            will-change: transform;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.1);
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        #welcomeScreen { background: #030509; display: none; }
        .welcome-title {
            color: #00d2ff;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.8));
            text-align: center;
        }
        
        #gameOverScreen { background: rgba(3, 5, 9, 0.96); display: none; }
        .game-over-title {
            color: #ff2222;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 40px;
            text-shadow: 0 0 25px rgba(255, 34, 34, 0.5);
        }
        
        .menu-btn {
            padding: 15px 50px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            background: #0b0e14;
            border: 2px solid #00d2ff;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }
        #restartBtn { border-color: #ff2222; box-shadow: 0 0 10px rgba(255,34,34,0.3); }

        #countdownOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(2, 4, 8, 0.94);
            z-index: 9;
        }
        #countdownText {
            font-size: 250px; 
            font-weight: 900;
            color: #ffdf00; 
            filter: drop-shadow(0 0 15px #d4af37) drop-shadow(0 0 40px #aa7c11);
            will-change: transform, opacity;
        }

        #rewardToast {
            position: absolute;
            top: 95px;
            left: 50%;
            transform: translateX(-50%) scale(0.85);
            background: #00d2ff;
            color: #000000;
            padding: 14px 24px;
            font-size: 13px;
            font-weight: 900;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 210, 255, 0.5);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            width: 90%;
            direction: rtl; /* راست‌چین برای پیام‌های فارسی ربات */
        }
        #rewardToast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="topBar">
        <div id="scoreBoard">
            <span class="sb-item" id="sbPass">PASS: 0/10</span>
            <span class="sb-item" id="sbScore">SCORE: 0</span>
            <span class="sb-item" id="sbStage">SECTOR: 1</span>
        </div>
        <!-- اضافه شدن دکمه AI کنار دکمه Pause -->
        <button id="aiBtn" class="top-action-btn">AI 🔒</button>
        <button id="pauseBtn" class="top-action-btn">Pause</button>
    </div>

    <div id="rewardToast">شما توکن لازم برای درخواست پرامپت را جمع کرده‌اید! برای ورود به بات روی AI کلیک کنید. 🔥</div>
    
    <div id="controls">
        <button id="btnLeft" class="btn">◀</button>
        <button id="btnRight" class="btn">▶</button>
    </div>

    <div id="welcomeScreen" class="screen-overlay">
        <div class="welcome-title">QUANTUM TRACK</div>
        <button id="startBtn" class="menu-btn">Launch Ship</button>
    </div>

    <div id="gameOverScreen" class="screen-overlay">
        <div class="game-over-title">CRITICAL CRASH</div>
        <button id="restartBtn" class="menu-btn">Respawn Ship</button>
    </div>

    <div id="countdownOverlay">
        <div id="countdownText">3</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;

const welcomeScreen = document.getElementById('welcomeScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const countdownOverlay = document.getElementById('countdownOverlay');
const countdownText = document.getElementById('countdownText');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');
const aiBtn = document.getElementById('aiBtn');

const sbPass = document.getElementById('sbPass');
const sbScore = document.getElementById('sbScore');
const sbStage = document.getElementById('sbStage');
const rewardToast = document.getElementById('rewardToast');

let score = 0;
let currentStageIndex = 0; 
let passedCarsCount = 0; 
let isPlaying = false;
let isPaused = false; 
let isBurning = false; 
let lastTime = 0;
let roadLinesY = 0;
let enemySpawnTimer = 0;
let enemies = [];
let particles = [];
let sceneryItems = [];
let lastSpawnLane = -1; 
let animationFrameId = null; 
let isAiUnlocked = false; // وضعیت قفل هوش مصنوعی

let baseRoadSpeed = 560; 
let playerSpeed = 590;
let realGameStageLevel = 0; 

const player = {
    x: 250, y: 520, 
    width: 58, height: 84, 
    movingLeft: false, movingRight: false
};

// نمایش اولیه صفحه اول
welcomeScreen.style.display = 'flex';

function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
}
resizeCanvas();

const spaceSectors = [
    { key: 'astro', name: 'ASTRO', color: '#facc15', type: 'STANDARD' },
    { key: 'meteor', name: 'METEOR', color: '#334155', type: 'SPEED_OBSTACLE' }, 
    { key: 'comet', name: 'COMET', color: '#c084fc', type: 'NEW_COLOR' },     
    { key: 'orbit', name: 'ORBIT', color: '#0284c7', type: 'BIG_SIZE' },       
    { key: 'nova', name: 'NOVA', color: '#dc2626', type: 'CHAOS' }             
];

const vehicleCacheCanvases = {};

function generateVehicleGraphicsCache(key, color, name, isPlayer = false) {
    const w = 90, h = 130;
    const cacheCanvas = document.createElement('canvas');
    cacheCanvas.width = w; cacheCanvas.height = h;
    const c = cacheCanvas.getContext('2d');
    c.fillStyle = isPlayer ? 'rgba(0, 229, 255, 0.35)' : 'rgba(255, 68, 0, 0.25)';
    c.beginPath(); c.arc(45, 110, 22, 0, Math.PI * 2); c.fill();
    c.fillStyle = color;
    c.beginPath();
    if (isPlayer) {
        c.moveTo(45, 12); c.lineTo(76, 82); c.lineTo(62, 102); c.lineTo(45, 90); c.lineTo(28, 102); c.lineTo(14, 82);
    } else {
        c.moveTo(45, 106); c.lineTo(76, 36); c.lineTo(60, 16); c.lineTo(45, 26); c.lineTo(30, 16); c.lineTo(14, 36);
    }
    c.closePath(); c.fill();
    c.lineWidth = 1.8; c.strokeStyle = '#05070a'; c.stroke();
    c.fillStyle = 'rgba(15, 23, 42, 0.9)';
    c.beginPath();
    if (isPlayer) { c.ellipse(45, 52, 12, 22, 0, 0, Math.PI * 2); } else { c.ellipse(45, 62, 14, 16, 0, 0, Math.PI * 2); }
    c.fill();
    c.fillStyle = isPlayer ? '#ffffff' : '#ff3333';
    c.fillRect(18, 70, 4, 14); c.fillRect(68, 70, 4, 14);
    c.fillStyle = '#ffffff'; c.font = '900 9px monospace'; c.textAlign = 'center';
    c.fillText(name, 45, isPlayer ? 84 : 48);
    vehicleCacheCanvases[key] = cacheCanvas;
}

function buildAllGraphicsCaches() {
    generateVehicleGraphicsCache('player', '#00e5ff', 'ALPHA', true);
    spaceSectors.forEach((sector, idx) => {
        generateVehicleGraphicsCache(sector.key + '_' + idx, sector.color, sector.name, false);
    });
}
buildAllGraphicsCaches();

function updateScoreUI() {
    sbPass.innerText = `PASS: ${passedCarsCount}/10`;
    sbScore.innerText = `SCORE: ${score}`;
    sbStage.innerText = `SECTOR: ${realGameStageLevel + 1}`;
}

function checkStageProgression() {
    passedCarsCount++;
    
    // منطق بررسی رسیدن به امتیاز ۱۰۰ برای باز شدن هوش مصنوعی
    if (score >= 100 && !isAiUnlocked) {
        isAiUnlocked = true;
        aiBtn.classList.add('active');
        aiBtn.innerText = "AI 🔓";
        showToastNotification("شما توکن لازم برای درخواست پرامپت را جمع کرده‌اید! برای ورود به بات روی AI کلیک کنید. 🔥");
    }

    if (passedCarsCount >= 10) {
        passedCarsCount = 0;
        currentStageIndex = (currentStageIndex < spaceSectors.length - 1) ? currentStageIndex + 1 : 0;
        realGameStageLevel++;
        baseRoadSpeed = 560 + (realGameStageLevel * 140);
        playerSpeed = 590 + (realGameStageLevel * 75);
    }
    updateScoreUI();
}

function showToastNotification(text) {
    rewardToast.innerText = text;
    rewardToast.classList.add('show');
    setTimeout(() => { rewardToast.classList.remove('show'); }, 4000);
}

function initScenery() {
    sceneryItems = [];
    const plasmaColors = ['#ff007f', '#00f5ff', '#ffdf00'];
    for (let y = -100; y < canvas.height + 100; y += 190) {
        sceneryItems.push({ x: canvas.width * 0.04, y: y, color: plasmaColors[Math.floor(Math.random() * 3)] });
        sceneryItems.push({ x: canvas.width * 0.96, y: y + 95, color: plasmaColors[Math.floor(Math.random() * 3)] });
    }
}

function updateAndDrawScenery(speed, dt) {
    ctx.fillStyle = '#060a12';
    ctx.fillRect(0, 0, canvas.width * 0.08, canvas.height);
    ctx.fillRect(canvas.width * 0.92, 0, canvas.width * 0.08, canvas.height);
    for(let i=0; i<sceneryItems.length; i++) {
        const item = sceneryItems[i];
        if (isPlaying && !isPaused && !isBurning) item.y += speed * dt;
        if (item.y > canvas.height + 25) item.y = -25;
        ctx.fillStyle = item.color;
        ctx.beginPath(); ctx.arc(item.x - 4, item.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(item.x + 4, item.y, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(item.x, item.y, 3, 0, Math.PI * 2); ctx.fill();
    }
}

class EnemyCar {
    constructor() {
        this.jobSpec = spaceSectors[currentStageIndex];
        this.width = (this.jobSpec.type === 'BIG_SIZE') ? 66 : 58;
        this.height = (this.jobSpec.type === 'BIG_SIZE') ? 104 : 84;
        const lanes = [canvas.width * 0.23, canvas.width * 0.5, canvas.width * 0.77];
        let targetLaneIndex = Math.floor(Math.random() * lanes.length);
        if (targetLaneIndex === lastSpawnLane) { targetLaneIndex = (targetLaneIndex + 1) % lanes.length; }
        lastSpawnLane = targetLaneIndex;
        this.x = lanes[targetLaneIndex]; this.y = -130;
        this.speed = baseRoadSpeed - 55 + (Math.random() * 60); 
        this.passed = false;
        this.cacheKey = this.jobSpec.key + '_' + currentStageIndex;
    }
    update(dt) { this.y += this.speed * dt; }
    draw() {
        const imgCache = vehicleCacheCanvases[this.cacheKey];
        if (imgCache) { ctx.drawImage(imgCache, this.x - this.width/2, this.y - this.height/2, this.width, this.height); }
    }
}

function handleEnemies(dt) {
    if (!isPaused && !isBurning) enemySpawnTimer += dt;
    let currentType = spaceSectors[currentStageIndex].type;
    let baseInterval = (currentType === 'SPEED_OBSTACLE' || currentType === 'CHAOS') ? 0.42 : 0.80 - (realGameStageLevel * 0.09);
    if (enemySpawnTimer > Math.max(0.28, baseInterval) && !isPaused && !isBurning) {
        enemies.push(new EnemyCar()); enemySpawnTimer = 0;
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
        if (!isPaused && !isBurning) enemies[i].update(dt);
        enemies[i].draw();
        if (!enemies[i].passed && enemies[i].y > player.y + player.height / 2) {
            enemies[i].passed = true; score += 25; checkStageProgression();
        }
        if (enemies[i].y > canvas.height + 130) { enemies.splice(i, 1); continue; }
        if (!isBurning && intersects(player.x, player.y, player.width, player.height, enemies[i].x, enemies[i].y, enemies[i].width, enemies[i].height)) {
            isBurning = true; gameOver(); return;
        }
    }
}

function intersects(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x1 - w1/2.02 < x2 + w2/2.02 && x1 + w1/2.02 > x2 - w2/2.02 && y1 - h1/2.02 < y2 + h2/2.02 && y1 + h1/2.02 > y2 - h2/2.02;
}

function drawRoad(dt) {
    ctx.fillStyle = '#0a0d14'; ctx.fillRect(canvas.width * 0.08, 0, canvas.width * 0.84, canvas.height);
    const leftLimit = canvas.width * 0.08; const rightLimit = canvas.width * 0.92 - 6;
    updateAndDrawScenery(baseRoadSpeed, dt);
    ctx.fillStyle = '#b026ff'; ctx.fillRect(leftLimit, 0, 6, canvas.height); ctx.fillRect(rightLimit, 0, 6, canvas.height);
    if (isPlaying && !isPaused && !isBurning) {
        if (player.x - player.width / 1.95 <= leftLimit + 6 || player.x + player.width / 1.95 >= rightLimit) { isBurning = true; gameOver(); return; }
    }
    ctx.fillStyle = 'rgba(0, 210, 255, 0.45)';
    if (!isPaused && !isBurning) roadLinesY = (roadLinesY + baseRoadSpeed * dt) % 70;
    const lineX1 = canvas.width * 0.38 - 1.5; const lineX2 = canvas.width * 0.62 - 1.5;
    for (let y = roadLinesY - 70; y < canvas.height; y += 70) { ctx.fillRect(lineX1, y, 3, 35); ctx.fillRect(lineX2, y, 3, 35); }
}

function startCountdown() {
    welcomeScreen.style.display = 'none'; gameOverScreen.style.display = 'none'; pauseBtn.style.display = 'none'; aiBtn.style.display = 'none';
    countdownOverlay.style.display = 'flex';
    let states = ['3', '2', '1']; let current = 0;
    function nextTick() {
        if (current < states.length) { countdownText.innerText = states[current]; current++; setTimeout(nextTick, 700); } else {
            countdownOverlay.style.display = 'none'; isPlaying = true; isPaused = false; isBurning = false;
            pauseBtn.innerText = "Pause"; pauseBtn.style.display = 'block'; aiBtn.style.display = 'block';
            lastTime = performance.now(); if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(loop);
        }
    }
    nextTick();
}

pauseBtn.addEventListener('click', () => {
    if (isBurning) return; isPaused = !isPaused; pauseBtn.innerText = isPaused ? "Resume" : "Pause";
    if (!isPaused) { lastTime = performance.now(); animationFrameId = requestAnimationFrame(loop); }
});

// عملکرد دکمه هوش مصنوعی برای خروج اتوماتیک و ورود به چت ربات تلگرام
aiBtn.addEventListener('click', () => {
    if (!isAiUnlocked) return; // اگر قفل باز نباشد کاری نکن
    
    // هدایت مستقیم کاربر به چت تلگرام ربات و فعال کردن استارت خودکار
    // آیدی ربات خودت را جایگزین "your_bot_username" کن
    const botUsername = "2049044424"; 
    window.location.href = `https://t.me/${botUsername}?start=ai_access`;
});

function gameOver() { isPlaying = false; pauseBtn.style.display = 'none'; gameOverScreen.style.display = 'flex'; }

function resetGame() {
    score = 0; currentStageIndex = 0; passedCarsCount = 0; lastSpawnLane = -1; realGameStageLevel = 0;
    baseRoadSpeed = 560; playerSpeed = 590; isBurning = false;
    player.movingLeft = false; player.movingRight = false;
    
    // ریست کردن وضعیت دکمه هوش مصنوعی در هر بازی جدید
    isAiUnlocked = false;
    aiBtn.classList.remove('active');
    aiBtn.innerText = "AI 🔒";
    
    updateScoreUI(); resizeCanvas(); player.x = canvas.width / 2; player.y = 520;
    enemies = []; enemySpawnTimer = -0.1; initScenery(); startCountdown();
}

function loop(currentTime) {
    if (!isPlaying || isPaused) return;
    let dt = (currentTime - lastTime) / 1000; if (dt > 0.05) dt = 0.016; lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height); drawRoad(dt);
    if (isPlaying && !isPaused && !isBurning) {
        if (player.movingLeft) player.x -= playerSpeed * dt;
        if (player.movingRight) player.x += playerSpeed * dt;
    }
    if (!isBurning) {
        const pCache = vehicleCacheCanvases['player'];
        if (pCache) { ctx.drawImage(pCache, player.x - player.width/2, player.y - player.height/2, player.width, player.height); }
    }
    handleEnemies(dt);
    if (isPlaying && !isPaused) animationFrameId = requestAnimationFrame(loop);
}

const btnLeft = document.getElementById('btnLeft'); const btnRight = document.getElementById('btnRight');
btnLeft.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); player.movingLeft = true; }, { passive: false });
btnLeft.addEventListener('touchend', () => player.movingLeft = false);
btnRight.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); player.movingRight = true; }, { passive: false });
btnRight.addEventListener('touchend', () => player.movingRight = false);

startBtn.addEventListener('click', resetGame); restartBtn.addEventListener('click', resetGame);
window.addEventListener('load', () => { resizeCanvas(); player.x = canvas.width / 2; player.y = 520; initScenery(); });
</script>
</body>
</html>
